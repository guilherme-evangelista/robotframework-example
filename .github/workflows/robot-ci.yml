name: Robot Framework CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout do Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- NOVO: Configurar Allure CLI no Linux ---
      - name: 📊 Setup Allure
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_version: 2.32.0

      - name: 🌐 Configurar Chrome e Display Virtual (Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 🤖 Executar Testes (Robot Framework)
        continue-on-error: true
        run: |
          # Note o uso do listener e o caminho correto :./allure-results
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          robot -d ./logs --listener allure_robotframework:./allure-results test/features/

      # --- NOVO: Gerar o Report Estático ---
      - name: 🛠️ Gerar Allure Report
        run: |
          # Transforma os JSONs em HTML dentro da pasta 'allure-report'
          npx allure-commandline generate ./allure-results --clean -o ./allure-report
        if: always()

      - name: 📁 Salvar Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/
          retention-days: 7

      - name: 🚀 Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report/  # Alterado de logs para allure-report
          publish_branch: gh-pages